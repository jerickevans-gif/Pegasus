<svg xmlns="http://www.w3.org/2000/svg" width="170" height="28" role="img" aria-label="Made with Pegasus">
  <title>Made with Pegasus</title>
  <linearGradient id="bg" x2="0" y2="100%">
    <stop offset="0" stop-color="#fff" stop-opacity=".7"/>
    <stop offset=".1" stop-color="#aaa" stop-opacity=".1"/>
    <stop offset=".9" stop-color="#000" stop-opacity=".3"/>
    <stop offset="1" stop-color="#000" stop-opacity=".5"/>
  </linearGradient>
  <clipPath id="clip"><rect width="170" height="28" rx="4" fill="#fff"/></clipPath>
  <g clip-path="url(#clip)">
    <rect width="80" height="28" fill="#0c0a09"/>
    <rect x="80" width="90" height="28" fill="#fafaf9"/>
    <rect width="170" height="28" fill="url(#bg)"/>

    <!-- Mini pegasus mark on dark side -->
    <g transform="translate(8, 6) scale(0.27)" fill="#fafaf9">
      <path d="M30 28 C 22 14, 14 8, 4 6 C 8 18, 14 26, 24 32 Z"/>
      <ellipse cx="38" cy="34" rx="13" ry="7"/>
      <path d="M48 32 C 50 26, 52 22, 54 20 C 56 18, 59 18, 60 20 C 60 22, 58 23, 56 24 C 56 26, 55 27, 54 28 L 52 32 Z"/>
    </g>

    <text x="42" y="19" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#fafaf9" font-weight="600">made with</text>
    <text x="125" y="19" font-family="Georgia,serif" font-size="14" fill="#0c0a09" font-weight="600" text-anchor="middle">Pegasus</text>
  </g>
</svg>
