<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
</head>
<body class="bg-gradient-to-b from-stone-50 to-stone-200 min-h-screen font-sans text-stone-900">

  <main class="max-w-md mx-auto px-6 py-16 text-center">

    <div class="w-24 h-24 mx-auto rounded-full bg-stone-300 mb-6 overflow-hidden">
      <!-- TODO: drop your headshot in ./avatar.jpg and reference it here -->
    </div>

    <h1 class="text-2xl font-bold">Your Name</h1>
    <p class="text-stone-600 mt-1">A short bio. One line. Calm and human.</p>

    <div class="mt-10 space-y-3">

      <a href="https://yoursite.com" class="block px-6 py-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition border border-stone-200 hover:border-stone-300">
        <span class="font-medium">Portfolio →</span>
      </a>

      <a href="mailto:you@example.com" class="block px-6 py-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition border border-stone-200 hover:border-stone-300">
        <span class="font-medium">Email me →</span>
      </a>

      <a href="https://linkedin.com/in/you" class="block px-6 py-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition border border-stone-200 hover:border-stone-300">
        <span class="font-medium">LinkedIn →</span>
      </a>

      <a href="https://read.cv/you" class="block px-6 py-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition border border-stone-200 hover:border-stone-300">
        <span class="font-medium">Read.cv →</span>
      </a>

      <a href="https://are.na/you" class="block px-6 py-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition border border-stone-200 hover:border-stone-300">
        <span class="font-medium">Are.na →</span>
      </a>

    </div>

    <footer class="mt-16 text-xs text-stone-500">
      Made with <a href="https://github.com/jerickevans-gif/Pegasus" class="underline">Pegasus</a>
    </footer>
  </main>

</body>
</html>
