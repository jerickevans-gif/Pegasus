<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · Page not found</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { serif: ['Crimson Pro','serif'], sans: ['Inter','sans-serif'] } } } }
  </script>
</head>
<body class="bg-stone-50 text-stone-900 font-sans min-h-screen flex items-center justify-center px-6">

  <main class="max-w-xl text-center">
    <p class="font-mono text-stone-500 text-sm tracking-widest mb-4">ERROR · 404</p>
    <h1 class="font-serif text-7xl md:text-9xl tracking-tight mb-6">Lost.</h1>
    <p class="text-xl text-stone-700 mb-2">
      The page you're looking for isn't here.
    </p>
    <p class="text-stone-600 mb-10">
      Maybe it moved. Maybe it never existed. Maybe a link rotted.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/" class="px-6 py-3 bg-stone-900 text-white rounded-full hover:bg-stone-700 transition">Go home</a>
      <a href="javascript:history.back()" class="px-6 py-3 bg-stone-200 text-stone-900 rounded-full hover:bg-stone-300 transition">Go back</a>
    </div>

    <p class="mt-16 text-sm text-stone-500">
      If you came from somewhere on this site, the broken link is on me — <a href="mailto:you@example.com" class="underline">let me know</a>.
    </p>
  </main>

</body>
</html>
