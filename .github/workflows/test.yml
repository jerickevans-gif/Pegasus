name: Test Pegasus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Install jsdom for tests
        run: npm install --no-save jsdom

      - name: Verify dashboard.css matches a fresh Tailwind build
        # Catches the bug class where someone edits dashboard.html (adds new
        # Tailwind classes) but forgets to rerun `npm run build:css`, leaving
        # prod with stale styles.
        run: |
          npx -y tailwindcss@3.4.16 -c tailwind.config.js -i src/tailwind.input.css -o /tmp/dashboard-built.css --minify
          if ! diff -q dashboard.css /tmp/dashboard-built.css >/dev/null; then
            echo "::error::dashboard.css is stale. Run: npm run build:css"
            diff dashboard.css /tmp/dashboard-built.css | head -40
            exit 1
          fi
          echo "✓ dashboard.css is up to date"

      - name: Syntax check shell scripts
        run: |
          bash -n install.sh
          bash -n bin/pegasus
          bash -n connect.sh
          bash -n desktop-apps.sh

      - name: ShellCheck (Ubuntu only — preinstalled there)
        # Linting beyond `bash -n`. Initially advisory; flip to required once the
        # baseline is clean. Runs on Ubuntu only because shellcheck ships preinstalled.
        if: matrix.os == 'ubuntu-latest'
        run: |
          shellcheck --version
          set +e
          shellcheck -S warning install.sh bin/pegasus connect.sh desktop-apps.sh scripts/install-hooks.sh scripts/integration-test.sh scripts/test-all.sh
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::shellcheck reported issues — currently advisory, will become required after baseline clean."
          fi
          exit 0
        continue-on-error: true

      - name: a11y check (pa11y, advisory)
        # WCAG2AA scan via pa11y on a localhost-served dashboard.html.
        # Initially advisory; ratchet to required once baseline issues are addressed.
        # Re-includes jsdom in the install list because `npm install` prunes
        # node_modules to match the install args when package.json has no
        # `dependencies` block.
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install --no-save jsdom pa11y http-server
          npx http-server -p 8765 -s &
          SERVER_PID=$!
          # Wait for server up
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8765/dashboard.html >/dev/null; then break; fi
            sleep 0.5
          done
          set +e
          npx pa11y --standard WCAG2AA --reporter cli http://localhost:8765/dashboard.html
          rc=$?
          kill $SERVER_PID 2>/dev/null || true
          if [ $rc -ne 0 ]; then
            echo "::warning::pa11y reported a11y issues — currently advisory."
          fi
          exit 0
        continue-on-error: true

      - name: Dashboard regression (33 checks)
        run: node scripts/test-dashboard.js

      - name: Links + onclick + parser (45 checks)
        run: node scripts/test-links-and-jobs.js

      - name: Every-suggestion validator (95 checks)
        run: node scripts/validate-everything.js

      - name: CLI integration (35 checks, repo-mode)
        run: PEGASUS_BIN="$PWD/bin/pegasus" bash scripts/integration-test.sh
        continue-on-error: true

      - name: Verify all template index.html files exist
        run: |
          # Skip support dirs (_workflows = GH Actions templates, auto-mode = workflow defs).
          for d in templates/*/; do
            name=$(basename "$d")
            case "$name" in _*|auto-mode) continue ;; esac
            test -f "$d/index.html" || (echo "Missing $d/index.html" && exit 1)
          done

      - name: Verify all skills have valid frontmatter
        run: |
          for d in skills/*/; do
            name=$(basename "$d")
            fm_name=$(awk '/^name:/{print $2; exit}' "$d/SKILL.md")
            if [ "$fm_name" != "$name" ]; then
              echo "FAIL: $name has frontmatter '$fm_name'"
              exit 1
            fi
          done
          echo "✓ All skills have correct frontmatter"
