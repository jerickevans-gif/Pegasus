<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Pegasus">
  <!-- Pegasus in flight, leaping rightward, wings spread up-back. -->
  <!-- Designed to read at 16px+. Solid silhouette, no detail noise. -->
  <g fill="#0c0a09">
    <!-- Upper wing (largest, swept back) -->
    <path d="M30 28
             C 22 14, 14 8, 4 6
             C 8 18, 14 26, 24 32 Z"/>
    <!-- Lower wing (overlap, slightly transparent for depth) -->
    <path d="M30 32
             C 18 26, 10 28, 6 34
             C 14 36, 22 38, 28 38 Z" opacity="0.65"/>
    <!-- Body (chest + barrel) -->
    <ellipse cx="38" cy="34" rx="13" ry="7"/>
    <!-- Neck + head — arched up and forward -->
    <path d="M48 32
             C 50 26, 52 22, 54 20
             C 56 18, 59 18, 60 20
             C 60 22, 58 23, 56 24
             C 56 26, 55 27, 54 28
             L 52 32 Z"/>
    <!-- Mane — flowing back from neck -->
    <path d="M50 26 L 52 22 L 50 22 L 49 26 Z" opacity="0.8"/>
    <!-- Front legs (folded mid-stride) -->
    <path d="M34 40 L 33 50 L 35 50 L 36 41 Z"/>
    <path d="M40 40 L 41 48 L 43 48 L 42 40 Z"/>
    <!-- Back legs (extended for leap) -->
    <path d="M28 38 L 24 50 L 26 50 L 30 39 Z"/>
    <path d="M30 38 L 28 47 L 30 47 L 32 38 Z"/>
    <!-- Tail flowing back -->
    <path d="M26 34 C 18 32, 12 36, 8 42 C 16 38, 22 38, 26 36 Z"/>
  </g>
</svg>
