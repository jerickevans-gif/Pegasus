<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Pegasus" role="img">
  <!--
    Pegasus — winged horse, profile view.
    v7: wing as a single bold arching scimitar — front-shoulder-up-and-back —
    raised above the body with negative-space gap. Three subtle feather
    scallops at the trailing edge. Body unchanged from v4.
  -->
  <g fill="currentColor" stroke="none">
    <!-- BODY + neck + head + 2 fused leg-masses -->
    <path d="
      M 6 38
      C 8 32, 16 30, 24 30
      L 42 30
      C 46 30, 49 28, 51 24
      C 52 21, 53 18, 55 17
      C 57 16, 60 17, 60 19
      C 60 21, 57 22, 55 23
      C 56 25, 55 27, 53 28
      L 50 32
      C 51 35, 51 38, 49 40
      L 49 50
      C 49 53, 39 53, 39 50
      L 39 42
      C 32 43, 25 43, 18 42
      L 18 50
      C 18 53,  8 53,  8 50
      L  8 42
      Z
    "/>
    <!-- WING — single bold scimitar, arches from shoulder up-and-back.
         Raised above body with clear gap. Trailing edge has 3 soft
         scallops for feather suggestion (no separate fingers). -->
    <path d="
      M 28 28
      C 30 22, 34 16, 40 12
      C 44 10, 46 12, 44 16
      C 41 21, 38 24, 36 27
      L 32 25
      L 28 28
      Z
      M 36 27
      C 38 26, 40 24, 42 22
      C 44 19, 46 16, 47 14
      C 50 10, 53 11, 52 14
      C 50 19, 47 22, 44 25
      L 40 24
      L 36 27
      Z
    "/>
  </g>
</svg>
